<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Your Name</title>
  <meta name="description" content="Engineering projects spanning robotics, mechanical design, and electronic systems." />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>" />
</head>
<body>

  <!-- ── NAVIGATION ── -->
  <nav>
    <a href="../index.html" class="nav-logo">YN<span>.eng</span></a>
    <ul class="nav-links">
      <li><a href="../index.html#about">About</a></li>
      <li><a href="../index.html#skills">Skills</a></li>
      <li><a href="projects.html" class="active">Projects</a></li>
      <li><a href="../index.html#work">Experience</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="../index.html#contact">Contact</a></li>
    </ul>
    <a href="../index.html#contact" class="nav-cta">Hire Me →</a>
    <div class="hamburger"><span></span><span></span><span></span></div>
  </nav>

  <!-- ── PAGE HERO ── -->
  <div class="page-hero">
    <div class="page-hero-bg"></div>
    <div class="page-hero-inner">
      <p class="section-label reveal">Portfolio</p>
      <h1 class="section-title reveal" style="font-size: clamp(2.5rem, 6vw, 5rem); margin-bottom: 1rem;">
        All Projects
      </h1>
      <p class="section-subtitle reveal" style="margin-bottom: 0;">
        From concept sketches to working hardware — everything I've designed, built, and shipped.
      </p>
    </div>
  </div>

  <!-- ── PROJECTS CONTENT ── -->
  <section style="padding-top: 2rem;">
    <div class="section-inner">

      <!-- Filter Bar -->
      <div class="filter-bar reveal">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="robotics">Robotics</button>
        <button class="filter-btn" data-filter="mechanical">Mechanical</button>
        <button class="filter-btn" data-filter="electronics">Electronics</button>
        <button class="filter-btn" data-filter="software">Software</button>
      </div>

      <!-- Populated by data.js + render.js -->
      <div class="projects-full-grid" id="projects-grid"></div>
    </div>
  </section>

  <!-- ── FOOTER ── -->
  <footer>
    <p class="footer-copy">© 2025 Your Name — Mechanical Engineer</p>
    <ul class="footer-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="../index.html#contact">Contact</a></li>
    </ul>
  </footer>

  <script src="../js/data.js"></script>
  <script src="../js/render.js"></script>
  <script src="../js/main.js"></script>
  <script>
    // ── FILTER BUTTONS ──
    const filterBtns  = document.querySelectorAll('.filter-btn');
    const projectGrid = document.getElementById('projects-grid');

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => { b.classList.remove('active'); });
        btn.classList.add('active');
        const filter = btn.dataset.filter;

        const cards = projectGrid.querySelectorAll('.project-full-card');
        cards.forEach(card => {
          const cats = card.dataset.category || '';
          card.style.display = (filter === 'all' || cats.includes(filter)) ? 'block' : 'none';
        });
      });
    });

    // ── CARD CLICK — open detail page ──
    // Runs after render.js has injected the cards
    projectGrid.addEventListener('click', e => {
      const card = e.target.closest('.project-full-card');
      if (!card) return;
      // Don't navigate if they clicked a link inside the card
      if (e.target.closest('a')) return;
      const id = card.dataset.id;
      if (id !== undefined) {
        window.location.href = `projectdetail.html?id=${id}`;
      }
    });
  </script>
</body>
</html>
