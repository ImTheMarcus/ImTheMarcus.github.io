<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project — Your Name</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <link rel="stylesheet" href="../css/project-detail.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>" />
</head>
<body>

  <!-- ── NAVIGATION ── -->
  <nav>
    <a href="../index.html" class="nav-logo">YN<span>.eng</span></a>
    <ul class="nav-links">
      <li><a href="../index.html#about">About</a></li>
      <li><a href="../index.html#skills">Skills</a></li>
      <li><a href="projects.html" class="active">Projects</a></li>
      <li><a href="../index.html#work">Experience</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="../index.html#contact">Contact</a></li>
    </ul>
    <a href="projects.html" class="nav-cta">← All Projects</a>
    <div class="hamburger"><span></span><span></span><span></span></div>
  </nav>

  <!-- ── PROJECT HERO ── -->
  <div class="page-hero">
    <div class="page-hero-bg"></div>
    <div class="page-hero-inner">
      <p class="section-label" id="detail-tag"></p>
      <h1 class="section-title" id="detail-title" style="font-size:clamp(2rem,5vw,4rem); margin-bottom:0.8rem;"></h1>
      <div class="detail-meta" id="detail-meta"></div>
    </div>
  </div>

  <!-- ── MAIN LAYOUT ── -->
  <div class="detail-layout">

    <main class="detail-main">

      <!-- ── 3D VIEWER (only shown if project has a model file) ── -->
      <section class="detail-section" id="section-3d" style="display:none;">
        <div class="detail-section-label">
          <span class="ds-icon">⬡</span> 3D Model
          <span class="ds-badge" id="model-filename"></span>
        </div>
        <div class="viewer-container">
          <canvas id="model-canvas"></canvas>
          <div class="viewer-loading" id="viewer-loading">
            <div class="loading-spinner"></div>
            <span>Loading model...</span>
          </div>
          <div class="viewer-controls" id="viewer-controls" style="display:none;">
            <button class="viewer-btn" id="btn-reset" title="Reset view">⟳</button>
            <button class="viewer-btn" id="btn-wireframe" title="Toggle wireframe">⬡</button>
            <button class="viewer-btn" id="btn-material" title="Cycle material">◑</button>
          </div>
        </div>
        <p class="viewer-hint">Drag to orbit · Scroll to zoom · Two fingers to pan</p>
      </section>

      <!-- ── OVERVIEW ── -->
      <section class="detail-section">
        <div class="detail-section-label"><span class="ds-icon">≡</span> Overview</div>
        <div class="detail-prose" id="detail-desc"></div>
      </section>

      <!-- ── CODE VIEWER (only shown if project has code) ── -->
      <section class="detail-section" id="section-code" style="display:none;">
        <div class="detail-section-label">
          <span class="ds-icon">&gt;_</span> Code
        </div>
        <div class="ide-window">
          <div class="ide-titlebar">
            <div class="ide-dots">
              <span class="dot red"></span>
              <span class="dot yellow"></span>
              <span class="dot green"></span>
            </div>
            <span class="ide-filename" id="ide-filename"></span>
            <button class="ide-btn" id="btn-copy-code">⧉ Copy</button>
          </div>
          <div class="ide-body">
            <div class="ide-line-nums" id="ide-line-nums"></div>
            <div class="ide-code-wrap">
              <pre class="ide-pre"><code id="ide-code"></code></pre>
            </div>
          </div>
        </div>
      </section>

      <!-- ── MEDIA (only shown if project has images) ── -->
      <section class="detail-section" id="section-media" style="display:none;">
        <div class="detail-section-label"><span class="ds-icon">▣</span> Media</div>
        <div class="media-grid" id="media-grid"></div>
      </section>

    </main>

    <!-- ── SIDEBAR ── -->
    <aside class="detail-sidebar">
      <div class="sidebar-card">
        <h3 class="sidebar-card-title">Project Info</h3>
        <div class="info-list" id="sidebar-info"></div>
      </div>
      <div class="sidebar-card">
        <h3 class="sidebar-card-title">Tech Stack</h3>
        <div class="stack-list" id="sidebar-stack"></div>
      </div>
      <div class="sidebar-card">
        <h3 class="sidebar-card-title">Key Features</h3>
        <ul class="feature-list" id="sidebar-features"></ul>
      </div>
      <div class="sidebar-card">
        <h3 class="sidebar-card-title">Links</h3>
        <div class="sidebar-links" id="sidebar-links"></div>
      </div>
    </aside>

  </div>

  <!-- ── FOOTER ── -->
  <footer>
    <p class="footer-copy"></p>
    <ul class="footer-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="../index.html#contact">Contact</a></li>
    </ul>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-yaml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/render.js"></script>
  <script src="../js/project-detail.js"></script>
</body>
</html>
